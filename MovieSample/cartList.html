<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Insert title here</title>
    <link rel="stylesheet" type="text/css" href="css/basic.css" />
    <style type="text/css">
      .poster {
        width: 150px;
        height: 150px;
      }

      a {
        text-decoration: none;
      }
    </style>

    <script type="text/javascript"></script>
  </head>
  <body>
    <button name="delItem">삭제</button>
    <hr />
    <article class="main">
      <section>
        <table width="80%" align="center">
          <caption class="caption">
            찜 리스트
          </caption>
          <thead>
            <tr>
              <th>이미지</th>
              <th>상품번호</th>
              <th>상품이름</th>
              <th>가격</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="content">
            <!-- 찜목록 출력 -->
          </tbody>
        </table>
      </section>
      <section class="toalprice" id="price">
        <!-- 가격 -->
      </section>
      <section class="link">
        <table align="center">
          <tr>
            <td align="center">
              <a href="">주문하러 가기</a>
              <a href="index.html">DVD LIST</a>
            </td>
          </tr>
        </table>
      </section>
    </article>
  </body>
  <script>
    let tbody = document.querySelector('#content');
    let getDatas = () => {
      // 3. 로컬 스토리지 영역에 있는 데이터 가져오기
      let totalPrice = 0;

      // 먼저 localStorage에서 데이터 목록을 가져온다.
      const likedList = Object.entries(localStorage);

      for (let liked of likedList) {
        let row = tbody.insertRow(tbody.rows.length);
        let data = liked[1].split(',');
        let image = data[1];
        let price = data[2];
        let name = data[0];
        console.log(image);
        row.insertCell(0).innerHTML = `<img src="${image}" class="poster" />`;
        row.insertCell(1).innerHTML = liked[0];
        row.insertCell(2).innerHTML = name;
        row.insertCell(3).innerHTML = Number(price).toLocaleString() + '원';
        row.insertCell(4).innerHTML =
          `<button value="delete" product-id="${liked[0]}">삭제</button>`;
        console.log(liked);
        totalPrice += Number(price);
      }
      document.querySelector('.toalprice').innerHTML =
        `<h3>총 주문가격: ${Number(totalPrice).toLocaleString()}</h3>`;
    };

    getDatas();

    document.body.addEventListener(
      'click',
      function (event) {
        if (event.target.matches('[value="delete"]')) {
          let productCode = event.target.getAttribute('product-id');
          localStorage.removeItem(productCode);

          tbody.innerHTML = '';

          getDatas();
        }
      },
      false
    );
  </script>
</html>
